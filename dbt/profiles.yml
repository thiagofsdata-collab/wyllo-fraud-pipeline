# profiles.yml for dbt-duckdb
#
# DuckDB acts as both the engine AND the warehouse.
#
# Targets:
#   local (default) — reads the DuckDB file produced by
#                     ingestion/load_raw_to_duckdb.py. No AWS needed.
#   dev             — same engine but configured to read Parquet from S3
#                     via httpfs (requires AWS credentials).
#   ci              — in-memory, used by GitHub Actions.
#
# The same models run unchanged against all three. That portability is
# the whole point of the DuckDB choice.

wyllo_fraud:
  target: local
  outputs:

    local:
      type: duckdb
      # Relative to the dbt/ directory (dbt runs from there)
      path: "../data/warehouse/wyllo.duckdb"
      threads: 4

    dev:
      type: duckdb
      path: "../data/warehouse/wyllo_dev.duckdb"
      extensions:
        - httpfs
        - aws
        - parquet
      settings:
        s3_region: "{{ env_var('AWS_REGION', 'us-east-1') }}"
        s3_access_key_id: "{{ env_var('AWS_ACCESS_KEY_ID', '') }}"
        s3_secret_access_key: "{{ env_var('AWS_SECRET_ACCESS_KEY', '') }}"
      threads: 4

    ci:
      type: duckdb
      path: ":memory:"
      extensions: [parquet]
      threads: 2
